<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>800 - La Química del Aroma | Selector Pro</title>
    <style>
        body { font-family: 'Helvetica Neue', sans-serif; background-color: #1a1a1a; color: #e0e0e0; display: flex; justify-content: center; padding: 15px; margin: 0; min-height: 100vh; align-items: center; }
        .card { background: #2d2d2d; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); max-width: 450px; width: 100%; border: 1px solid #444; text-align: center; }
        
        .logo-box { border: 2px solid #d4a373; display: inline-block; padding: 10px 20px; border-radius: 15px; margin-bottom: 25px; }
        .logo-box h2 { font-size: 2.5em; margin: 0; color: #d4a373; line-height: 1; }
        .logo-box p { letter-spacing: 2px; font-size: 0.5em; margin: 0; color: #d4a373; font-weight: bold; border-top: 1px solid #d4a373; padding-top: 5px; }

        h1 { color: #d4a373; font-size: 1.3em; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; line-height: 1.2; }
        .intro-p { color: #aaa; font-size: 0.95em; line-height: 1.5; margin-bottom: 20px; }

        .step { display: none; }
        .active { display: block; animation: fadeIn 0.5s; }

        .option-btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            background: #3d3d3d; border: 2px solid #444; border-radius: 12px; 
            color: white; cursor: pointer; font-size: 1em; transition: all 0.3s;
            text-align: left; border-style: solid;
        }
        .option-btn:hover { border-color: #d4a373; background: #444; }

        .result-box { text-align: center; padding: 10px; }
        .coffee-name { color: #d4a373; font-size: 1.8em; font-weight: bold; margin: 15px 0; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .coffee-desc { font-style: italic; color: #ccc; margin-bottom: 25px; line-height: 1.4; }
        
        .btn-buy { background: #25D366; color: white; border: none; padding: 15px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; text-decoration: none; display: inline-block; box-sizing: border-box; font-size: 1.1em; margin-bottom: 10px; }
        .btn-reset { background: transparent; color: #aaa; border: 1px solid #444; padding: 10px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 0.8em; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-box">
        <h2>800</h2>
        <p>LA QUÍMICA DEL AROMA</p>
    </div>
    
    <div id="step-0" class="step active">
        <h1>Tu Café Ideal</h1>
        <p class="intro-p">Descubre la química perfecta para tu paladar y estilo de vida.</p>
        <button class="option-btn" style="text-align:center; background:#d4a373; color:#1a1a1a; font-weight:bold;" onclick="nextStep(1)">INICIAR TEST</button>
    </div>

    <div id="step-1" class="step">
        <h1>1. ¿Qué sensaciones buscas?</h1>
        <button class="option-btn" onclick="saveData('intensity', 'suave'); nextStep(2)">☕ Delicadeza y flores</button>
        <button class="option-btn" onclick="saveData('intensity', 'balanceado'); nextStep(2)">⚖️ Dulzura y frutos rojos</button>
        <button class="option-btn" onclick="saveData('intensity', 'fuerte'); nextStep(2)">🔥 Fuerza y chocolate</button>
    </div>

    <div id="step-2" class="step">
        <h1>2. ¿Cómo lo preparas?</h1>
        <button class="option-btn" onclick="saveData('metodo', 'Filtrado'); nextStep(3)">🧪 Goteo (V60, Chemex)</button>
        <button class="option-btn" onclick="saveData('metodo', 'Fuerte/Greca'); nextStep(3)">🇮🇹 Greca o Espresso</button>
        <button class="option-btn" onclick="saveData('metodo', 'Inmersión'); nextStep(3)">⏱️ Prensa o AeroPress</button>
    </div>

    <div id="step-3" class="step">
        <h1>3. ¿Cómo lo prefieres?</h1>
        <button class="option-btn" onclick="saveData('presentacion', 'en Grano'); nextStep(4)">🥜 En Grano (fresco)</button>
        <button class="option-btn" onclick="saveData('presentacion', 'Molido'); nextStep(4)">🔪 Molido (para mi método)</button>
    </div>

    <div id="step-4" class="step">
        <h1>4. ¿Solo o con leche?</h1>
        <button class="option-btn" onclick="saveData('estilo', 'negro'); nextStep(5)">🌑 Siempre Negro</button>
        <button class="option-btn" onclick="saveData('estilo', 'leche'); nextStep(5)">🥛 Con leche</button>
    </div>

    <div id="step-5" class="step">
        <h1>5. Notas favoritas:</h1>
        <button class="option-btn" onclick="saveData('notas', 'citrico'); showResult()">🍋 Cítricos</button>
        <button class="option-btn" onclick="saveData('notas', 'dulce'); showResult()">🍯 Dulces</button>
        <button class="option-btn" onclick="saveData('notas', 'cacao'); showResult()">🍫 Cacao</button>
    </div>

    <div id="step-result" class="step result-box">
        <p style="text-transform: uppercase; font-size: 0.8em; letter-spacing: 2px;">La química ha decidido:</p>
        <div id="coffee-result" class="coffee-name"></div>
        <p id="coffee-desc" class="coffee-desc"></p>
        
        <a id="whatsapp-link" href="#" target="_blank" class="btn-buy">
            🛒 PEDIR POR WHATSAPP
        </a>
        
        <button class="btn-reset" onclick="resetQuiz()">Repetir Test</button>
    </div>
</div>

<script>
    let answers = {};
    // Rotación de números: Alejo y Nano
    const NUMEROS = ["573043691414", "573214401032"];

    function saveData(key, value) {
        answers[key] = value;
    }

    function nextStep(step) {
        document.querySelectorAll('.step').forEach(div => div.classList.remove('active'));
        document.getElementById('step-' + step).classList.add('active');
    }

    function showResult() {
        document.querySelectorAll('.step').forEach(div => div.classList.remove('active'));
        const resultDiv = document.getElementById('step-result');
        const nameText = document.getElementById('coffee-result');
        const descText = document.getElementById('coffee-desc');
        const waLink = document.getElementById('whatsapp-link');

        let finalCoffee = "";
        let finalDesc = "";

        if (answers.estilo === 'leche' || answers.intensity === 'fuerte') {
            finalCoffee = "800 - BLEND MAESTRO";
            finalDesc = "Diseñado para los que buscan carácter. Sus notas achocolatadas resaltan increíblemente.";
        } else if (answers.intensity === 'suave') {
            finalCoffee = "800 - GEISHA";
            finalDesc = "Finca Santa María. Perfil floral a jazmín. La elegancia pura en taza.";
        } else {
            finalCoffee = "800 - BOURBON ROSADO";
            finalDesc = "Huila. Nuestra joya equilibrada con notas dulces a miel y frutos rojos.";
        }

        nameText.innerText = finalCoffee;
        descText.innerText = finalDesc;

        // Selección aleatoria del número para repartir pedidos
        const numeroElegido = NUMEROS[Math.floor(Math.random() * NUMEROS.length)];
        
        const message = `¡Hola 800! Mi química es: ${finalCoffee}. Lo quiero ${answers.presentacion} para mi método de ${answers.metodo}.`;
        waLink.href = `https://wa.me/${numeroElegido}?text=${encodeURIComponent(message)}`;

        resultDiv.classList.add('active');
    }

    function resetQuiz() {
        answers = {};
        nextStep(0);
    }
</script>
</body>
</html>
