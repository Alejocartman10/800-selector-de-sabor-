<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>800 - La Química del Aroma | Selector</title>
    <style>
        body { font-family: 'Helvetica Neue', sans-serif; background-color: #1a1a1a; color: #e0e0e0; display: flex; justify-content: center; padding: 15px; margin: 0; min-height: 100vh; align-items: center; }
        .card { background: #2d2d2d; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); max-width: 450px; width: 100%; border: 1px solid #444; text-align: center; }
        
        .logo-box { border: 2px solid #d4a373; display: inline-block; padding: 10px 20px; border-radius: 15px; margin-bottom: 25px; }
        .logo-box h2 { font-size: 2.5em; margin: 0; color: #d4a373; line-height: 1; }
        .logo-box p { letter-spacing: 2px; font-size: 0.5em; margin: 0; color: #d4a373; font-weight: bold; border-top: 1px solid #d4a373; padding-top: 5px; }

        h1 { color: #d4a373; font-size: 1.4em; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .intro-p { color: #aaa; font-size: 0.95em; line-height: 1.5; margin-bottom: 20px; }

        .step { display: none; }
        .active { display: block; animation: fadeIn 0.5s; }

        .option-btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            background: #3d3d3d; border: 2px solid #444; border-radius: 12px; 
            color: white; cursor: pointer; font-size: 1em; transition: all 0.3s;
            text-align: left; border-style: solid;
        }
        .option-btn:hover { border-color: #d4a373; background: #444; }

        .result-box { text-align: center; padding: 10px; }
        .coffee-name { color: #d4a373; font-size: 1.8em; font-weight: bold; margin: 15px 0; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .coffee-desc { font-style: italic; color: #ccc; margin-bottom: 20px; line-height: 1.4; }
        .btn-reset { background: #d4a373; color: #1a1a1a; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-box">
        <h2>800</h2>
        <p>LA QUÍMICA DEL AROMA</p>
    </div>
    
    <div id="step-0" class="step active">
        <h1>Tu Café Ideal</h1>
        <p class="intro-p">La química perfecta no es casualidad. Responde 3 preguntas y descubre cuál de nuestros granos 800 es para ti.</p>
        <button class="option-btn" style="text-align:center; background:#d4a373; color:#1a1a1a; font-weight:bold;" onclick="nextStep(1)">INICIAR DESCUBRIMIENTO</button>
    </div>

    <div id="step-1" class="step">
        <h1>1. ¿Cómo prefieres tu taza?</h1>
        <button class="option-btn" onclick="saveData('intensity', 'suave'); nextStep(2)">☕ Elegante, ligera y floral</button>
        <button class="option-btn" onclick="saveData('intensity', 'balanceado'); nextStep(2)">⚖️ Equilibrada, con dulzura marcada</button>
        <button class="option-btn" onclick="saveData('intensity', 'fuerte'); nextStep(2)">🔥 Intensa, con mucho cuerpo</button>
    </div>

    <div id="step-2" class="step">
        <h1>2. ¿Qué sabor te cautiva?</h1>
        <button class="option-btn" onclick="saveData('flavor', 'frutal'); nextStep(3)">🍋 Notas frutales y acidez limpia</button>
        <button class="option-btn" onclick="saveData('flavor', 'dulce'); nextStep(3)">🍯 Caramelo, miel o chocolate</button>
        <button class="option-btn" onclick="saveData('flavor', 'especia'); nextStep(3)">🪵 Notas maderosas y especiadas</button>
    </div>

    <div id="step-3" class="step">
        <h1>3. ¿Cuál es tu ritual?</h1>
        <button class="option-btn" onclick="showResult('filtrado')">🧪 Filtrado (V60, Chemex)</button>
        <button class="option-btn" onclick="showResult('inmersion')">⏱️ Inmersión (Prensa, AeroPress)</button>
        <button class="option-btn" onclick="showResult('fuerte')">🇮🇹 Método fuerte (Greca, Espresso)</button>
    </div>

    <div id="step-result" class="step result-box">
        <p style="text-transform: uppercase; font-size: 0.8em; letter-spacing: 2px;">Resultado de la Química:</p>
        <div id="coffee-result" class="coffee-name"></div>
        <p id="coffee-desc" class="coffee-desc"></p>
        <button class="btn-reset" onclick="resetQuiz()">REPETIR TEST</button>
    </div>
</div>

<script>
    let answers = {};

    function saveData(key, value) {
        answers[key] = value;
    }

    function nextStep(currentStep) {
        // Ocultamos todos los pasos
        document.querySelectorAll('.step').forEach(div => div.classList.remove('active'));
        // Mostramos el que sigue
        document.getElementById('step-' + currentStep).classList.add('active');
    }

    function showResult(metodo) {
        answers['metodo'] = metodo;
        
        document.querySelectorAll('.step').forEach(div => div.classList.remove('active'));
        const resultDiv = document.getElementById('step-result');
        const nameText = document.getElementById('coffee-result');
        const descText = document.getElementById('coffee-desc');

        // Lógica de recomendación de 800
        if (answers.intensity === 'suave' || answers.flavor === 'frutal') {
            nameText.innerText = "800 - GEISHA";
            descText.innerText = "Finca Santa María. Un perfil sofisticado con notas a jazmín y té verde. La máxima expresión de la elegancia en taza.";
        } else if (answers.intensity === 'balanceado' || answers.flavor === 'dulce') {
            nameText.innerText = "800 - BOURBON ROSADO";
            descText.innerText = "Huila (1700 msnm). Dulzura de frutos rojos, miel y cacao. Una química equilibrada ideal para cualquier método.";
        } else {
            nameText.innerText = "800 - BLEND MAESTRO";
            descText.innerText = "Cuerpo robusto con notas achocolatadas y un final prolongado. El aroma con la fuerza perfecta para tu ritual diario.";
        }

        resultDiv.classList.add('active');
    }

    function resetQuiz() {
        answers = {};
        nextStep(0);
    }
</script>

</body>
</html>
